<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>System Architecture v10</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #1a1a18;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
    }
    svg { width: 100%; max-width: 680px; }

    .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th   { fill: #3C3489; }
    .c-purple .ts   { fill: #534AB7; }

    .c-gray rect    { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th     { fill: #2C2C2A; }
    .c-gray .ts     { fill: #5F5E5A; }

    .c-teal rect    { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th     { fill: #085041; }
    .c-teal .ts     { fill: #0F6E56; }

    .c-blue rect    { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th     { fill: #0C447C; }
    .c-blue .ts     { fill: #185FA5; }

    .c-coral rect   { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th    { fill: #712B13; }
    .c-coral .ts    { fill: #993C1D; }

    .c-amber rect   { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th    { fill: #633806; }
    .c-amber .ts    { fill: #854F0B; }

    .c-green rect   { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th    { fill: #27500A; }
    .c-green .ts    { fill: #3B6D11; }

    .th { font-size: 14px; font-weight: 500; font-family: sans-serif; }
    .ts { font-size: 12px; font-weight: 400; font-family: sans-serif; }

    .fs-body  { fill: #2a2a28; stroke: #5F5E5A; stroke-width: 1; }
    .fs-top   { fill: #2a2a28; stroke: #5F5E5A; stroke-width: 1; }
    .fs-arc   { fill: none;    stroke: #5F5E5A; stroke-width: 1; }
    .fs-title { fill: #D3D1C7; font-size: 14px; font-weight: 500; font-family: sans-serif; }
    .fs-sub   { fill: #888780; font-size: 12px; font-weight: 400; font-family: sans-serif; }

    .legend-label { fill: #888780; font-size: 12px; font-family: sans-serif; }
    .legend-amber { fill: #BA7517; font-size: 12px; font-family: sans-serif; }
    .ui-label     { fill: #888780; font-size: 12px; font-family: sans-serif; }
  </style>
</head>
<body>
<svg viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>System Architecture v10</title>
  <desc>Three user entry paths including Paperclip dashboard approval/monitoring path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-rev" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M8 1L2 5L8 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- USER INTERFACE wrapper -->
  <rect x="20" y="20" width="640" height="200" rx="12" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="36" y="38" class="ui-label" dominant-baseline="central">User interface</text>

  <!-- Discord UI -->
  <g class="c-purple">
    <rect x="250" y="40" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="325" y="62" text-anchor="middle" dominant-baseline="central">Discord UI</text>
    <text class="ts" x="325" y="80" text-anchor="middle" dominant-baseline="central">MacBook / iPhone</text>
  </g>
  <line x1="325" y1="92" x2="325" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Paperclip Dashboard UI -->
  <g class="c-purple">
    <rect x="40" y="40" width="170" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="125" y="62" text-anchor="middle" dominant-baseline="central">Paperclip Dashboard</text>
    <text class="ts" x="125" y="80" text-anchor="middle" dominant-baseline="central">Approval / Monitoring</text>
  </g>
  <path d="M 125 92 L 125 262 L 223 262 L 223 292"
        fill="none" stroke="#888780" stroke-width="1"
        marker-end="url(#arrow)" marker-start="url(#arrow-rev)"/>
  <text x="134" y="246" style="fill:#888780; font-size:10px; font-family:sans-serif;" dominant-baseline="central">approval / review</text>

  <!-- Discord Cloud -->
  <g class="c-gray">
    <rect x="250" y="112" width="150" height="36" rx="8" stroke-width="0.5"/>
    <text class="ts" x="325" y="130" text-anchor="middle" dominant-baseline="central">Discord cloud</text>
  </g>
  <line x1="325" y1="148" x2="325" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Web UI -->
  <g class="c-purple">
    <rect x="490" y="40" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="565" y="62" text-anchor="middle" dominant-baseline="central">Web UI</text>
    <text class="ts" x="565" y="80" text-anchor="middle" dominant-baseline="central">MacBook / iPhone</text>
  </g>
  <line x1="565" y1="92" x2="565" y2="112" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tailscale VPN -->
  <g class="c-gray">
    <rect x="490" y="112" width="150" height="36" rx="8" stroke-width="0.5"/>
    <text class="ts" x="565" y="130" text-anchor="middle" dominant-baseline="central">Tailscale VPN</text>
  </g>
  <line x1="565" y1="148" x2="565" y2="398" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- COMM PLANE -->
  <g class="c-teal">
    <rect x="225" y="178" width="200" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="325" y="200" text-anchor="middle" dominant-baseline="central">Communication plane</text>
    <text class="ts" x="325" y="218" text-anchor="middle" dominant-baseline="central">NanoClaw / Discord bot</text>
  </g>
  <line x1="325" y1="242" x2="325" y2="292" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow-rev)"/>
  <text x="339" y="268" style="fill:#888780; font-size:10px; font-family:sans-serif;" dominant-baseline="central">control / feedback</text>

  <!-- HARNESS PLANE -->
  <g class="c-teal">
    <rect x="225" y="292" width="200" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="325" y="314" text-anchor="middle" dominant-baseline="central">Harness plane</text>
    <text class="ts" x="325" y="332" text-anchor="middle" dominant-baseline="central">Paperclip + P/G/V loop</text>
  </g>

  <!-- STATE PLANE -->
  <g class="c-blue">
    <rect x="30" y="292" width="168" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="114" y="312" text-anchor="middle" dominant-baseline="central">State plane</text>
    <text class="ts" x="114" y="330" text-anchor="middle" dominant-baseline="central">Queue · Log · Metadata</text>
  </g>
  <!-- Comm <-> State -->
  <path d="M 198 308 L 176 308 L 176 210 L 223 210" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow-rev)"/>
  <text x="142" y="262" style="fill:#888780; font-size:11px; font-family:sans-serif;" text-anchor="middle">status / enqueue</text>
  <!-- Harness <-> State -->
  <line x1="198" y1="324" x2="223" y2="324" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow-rev)"/>
  <text x="210" y="316" style="fill:#888780; font-size:10px; font-family:sans-serif;" text-anchor="end">claim / ack</text>

  <!-- EXECUTION PLANE -->
  <line x1="325" y1="356" x2="325" y2="398" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow-rev)"/>
  <g class="c-coral">
    <rect x="225" y="398" width="200" height="64" rx="8" stroke-width="0.5"/>
    <text class="th" x="325" y="420" text-anchor="middle" dominant-baseline="central">Execution plane</text>
    <text class="ts" x="325" y="438" text-anchor="middle" dominant-baseline="central">Sandbox · Preview · Adapters</text>
  </g>

  <!-- OBSERVABILITY -->
  <g class="c-amber">
    <rect x="468" y="398" width="172" height="72" rx="8" stroke-width="0.5"/>
    <text class="th" x="554" y="420" text-anchor="middle" dominant-baseline="central">Observability</text>
    <text class="ts" x="554" y="438" text-anchor="middle" dominant-baseline="central">Logs · Traces · Health</text>
    <text class="ts" x="554" y="455" text-anchor="middle" dominant-baseline="central">Dashboard</text>
  </g>
  <path d="M 468 410 L 446 410 L 446 210 L 427 210" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-amber)"/>
  <path d="M 468 424 L 450 424 L 450 324 L 427 324" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-amber)"/>
  <path d="M 468 438 L 228 438 L 228 358 L 200 358" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-amber)"/>
  <line x1="466" y1="434" x2="427" y2="434" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-amber)"/>

  <!-- Execution → Workflows -->
  <path d="M 260 462 L 260 524 L 130 524 L 130 540" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 325 462 L 325 524 L 310 524 L 310 540" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 390 462 L 390 524 L 490 524 L 490 540" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Develop Workflow -->
  <g class="c-green">
    <rect x="40" y="540" width="150" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="115" y="562" text-anchor="middle" dominant-baseline="central">Develop workflow</text>
    <text class="ts" x="115" y="580" text-anchor="middle" dominant-baseline="central">Code / test / build</text>
  </g>

  <!-- Wiki Workflow -->
  <g class="c-green">
    <rect x="235" y="540" width="150" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="310" y="562" text-anchor="middle" dominant-baseline="central">Wiki workflow</text>
    <text class="ts" x="310" y="580" text-anchor="middle" dominant-baseline="central">Ingest / compile / lint</text>
  </g>

  <!-- etc. Workflow (dashed placeholder) -->
  <rect x="425" y="540" width="150" height="56" rx="8" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" opacity="0.5"/>
  <text x="500" y="562" text-anchor="middle" dominant-baseline="central" class="ts" style="fill:#888780; opacity:0.45">workflow</text>
  <text x="500" y="580" text-anchor="middle" dominant-baseline="central" class="th" style="fill:#888780; opacity:0.35">+ etc.</text>

  <!-- GitHub Blog -->
  <g class="c-gray">
    <rect x="40" y="640" width="150" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="115" y="662" text-anchor="middle" dominant-baseline="central">GitHub Blog</text>
  </g>
  <line x1="115" y1="596" x2="115" y2="638" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- WORKSPACE cylinder -->
  <rect x="322" y="728" width="156" height="52" class="fs-body"/>
  <ellipse cx="400" cy="728" rx="78" ry="12" class="fs-top"/>
  <path d="M 322 780 Q 400 794 478 780" class="fs-arc"/>
  <text x="400" y="752" text-anchor="middle" dominant-baseline="central" class="fs-title">Workspace / repos</text>
  <text x="400" y="770" text-anchor="middle" dominant-baseline="central" class="fs-sub">filesystem</text>

  <path d="M 155 684 L 155 710 L 370 710 L 370 726" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 310 596 L 310 710 L 400 710 L 400 726" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- STATE STORAGE cylinder -->
  <rect x="30" y="728" width="156" height="52" class="fs-body"/>
  <ellipse cx="108" cy="728" rx="78" ry="12" class="fs-top"/>
  <path d="M 30 780 Q 108 794 186 780" class="fs-arc"/>
  <text x="108" y="752" text-anchor="middle" dominant-baseline="central" class="fs-title">State storage</text>
  <text x="108" y="770" text-anchor="middle" dominant-baseline="central" class="fs-sub">filesystem</text>

  <line x1="114" y1="356" x2="114" y2="714" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <line x1="242" y1="818" x2="268" y2="818" stroke="#888780" stroke-width="1"/>
  <text x="274" y="822" class="legend-label" dominant-baseline="central">Data / control flow</text>
  <line x1="420" y1="818" x2="446" y2="818" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="452" y="822" class="legend-amber" dominant-baseline="central">Observability watch</text>
</svg>
</body>
</html>
