---
layout: default
title: "카테고리"
permalink: /categories/
---

<div class="post">
  <header class="post-header">
    <h1 class="post-title"><i class="fa fa-folder"></i> 카테고리</h1>
  </header>
  <div class="post-content">
    {% assign sorted_cats = site.categories | sort %}
    {% for cat in sorted_cats %}
    <h2 id="{{ cat[0] }}">
      <i class="fa fa-folder-open" style="color: var(--accent-yellow);"></i>
      {{ cat[0] }}
      <small style="color: var(--text-muted); font-size: 0.8rem;">{{ cat[1].size }}개</small>
    </h2>
    <ul style="margin-bottom: 2rem;">
      {% for post in cat[1] %}
      <li style="padding: 0.3rem 0;">
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span style="color: var(--text-muted); font-size: 0.8rem; margin-left: 0.5rem;">{{ post.date | date: "%Y.%m.%d" }}</span>
      </li>
      {% endfor %}
    </ul>
    {% endfor %}
  </div>
</div>
