---
layout: default
title: "지식 그래프"
permalink: /graph/
---

<section class="graph-scene">
  <div class="graph-intro">
    <p class="eyebrow">explore</p>
    <h1 class="page-title">지식 그래프</h1>
    <p class="home-description">노드를 따라 이동하며 글 사이의 연결을 읽는 공간입니다.</p>
  </div>

  <div class="graph-surface">
    <div id="graph-container-full">
      <svg id="knowledge-graph-full"></svg>
    </div>
  </div>
  <p class="graph-hint">노드를 드래그하거나 클릭해 연결을 따라갈 수 있습니다.</p>
</section>

<script>
(async function () {
  const base = window.SITE_BASEURL || '';
  let data;
  try {
    const res = await fetch(`${base}/graph-data.json`);
    data = await res.json();
  } catch (e) {
    return;
  }

  if (!data || !data.nodes || !data.nodes.length || typeof d3 === 'undefined') return;

  data.nodes.forEach(n => { n.linkCount = 0; });
  data.links.forEach(l => {
    const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
    const targetId = typeof l.target === 'object' ? l.target.id : l.target;
    const sourceNode = data.nodes.find(n => n.id === sourceId);
    const targetNode = data.nodes.find(n => n.id === targetId);
    if (sourceNode) sourceNode.linkCount += 1;
    if (targetNode) targetNode.linkCount += 1;
  });

  const container = document.getElementById('graph-container-full');
  const svgEl = document.getElementById('knowledge-graph-full');
  if (!container || !svgEl) return;

  const width = container.clientWidth;
  const height = container.clientHeight;
  const svg = d3.select(svgEl).attr('width', width).attr('height', height);
  const root = svg.append('g').attr('class', 'graph-root');

  const tooltip = document.createElement('div');
  tooltip.className = 'graph-tooltip';
  tooltip.style.display = 'none';
  container.appendChild(tooltip);

  const zoom = d3.zoom()
    .scaleExtent([0.3, 4])
    .on('zoom', event => root.attr('transform', event.transform));

  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.82));

  const simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d => d.id).distance(84).strength(0.32))
    .force('charge', d3.forceManyBody().strength(-220).distanceMax(360))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(d => 14 + Math.min(d.linkCount || 0, 6) * 1.3));

  const link = root.append('g')
    .selectAll('line')
    .data(data.links)
    .enter()
    .append('line')
    .attr('class', 'graph-link');

  const node = root.append('g')
    .selectAll('g')
    .data(data.nodes)
    .enter()
    .append('g')
    .attr('class', 'graph-node')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      })
      .on('drag', (event, d) => {
        d.fx = event.x;
        d.fy = event.y;
      })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }));

  node.append('circle')
    .attr('r', d => 4.8 + Math.min(d.linkCount || 0, 6) * 1.1)
    .attr('fill', 'var(--accent)');

  node.append('text')
    .attr('dx', d => 9 + Math.min(d.linkCount || 0, 6))
    .attr('dy', '0.35em')
    .text(d => d.title.length > 18 ? `${d.title.slice(0, 18)}…` : d.title);

  node
    .on('mouseover', function (event, d) {
      const connectedIds = new Set([d.id]);
      data.links.forEach(l => {
        const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
        const targetId = typeof l.target === 'object' ? l.target.id : l.target;
        if (sourceId === d.id) connectedIds.add(targetId);
        if (targetId === d.id) connectedIds.add(sourceId);
      });

      node.classed('dimmed', n => !connectedIds.has(n.id));
      link.classed('dimmed', l => {
        const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
        const targetId = typeof l.target === 'object' ? l.target.id : l.target;
        return sourceId !== d.id && targetId !== d.id;
      });
      link.classed('highlighted', l => {
        const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
        const targetId = typeof l.target === 'object' ? l.target.id : l.target;
        return sourceId === d.id || targetId === d.id;
      });

      tooltip.textContent = d.title;
      tooltip.style.display = 'block';
    })
    .on('mousemove', function (event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = `${event.clientX - rect.left + 14}px`;
      tooltip.style.top = `${event.clientY - rect.top - 8}px`;
    })
    .on('mouseout', function () {
      node.classed('dimmed', false);
      link.classed('dimmed', false).classed('highlighted', false);
      tooltip.style.display = 'none';
    })
    .on('click', function (event, d) {
      if (d.url) window.location.href = `${base}${d.url}`;
    });

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
})();
</script>
