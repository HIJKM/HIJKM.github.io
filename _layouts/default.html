<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="page-{{ page.layout | default: 'default' }}{% if page.url == '/' %} is-home{% endif %}">

  <header class="site-header">
    <div id="reading-progress"></div>
    <a class="site-logo" href="{{ '/' | relative_url }}">HIJKM</a>
    <div class="header-search" id="header-search">
      <div class="search-input-wrap">
        <input id="search-input" class="header-search-input" type="text"
               placeholder="search…" autocomplete="off" spellcheck="false">
      </div>
      <button id="search-btn" class="btn-search" aria-label="검색">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.6"/>
          <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- 검색 드롭다운 -->
  <div id="search-dropdown" class="search-dropdown">
    <div class="search-dropdown-inner">
      <div id="search-results"></div>
    </div>
  </div>

  <div class="site-shell">
    <main id="main-content">
      {{ content }}
    </main>
  </div>

  <!-- 그래프 모달 -->
  <div id="graph-modal" class="graph-modal" role="dialog" aria-modal="true" aria-label="지식 그래프">
    <div class="graph-modal-backdrop"></div>
    <div class="graph-modal-panel">
      <header class="graph-modal-header">
        <span class="graph-modal-title">knowledge graph</span>
        <button id="graph-modal-close" class="graph-modal-close" aria-label="닫기">✕</button>
      </header>
      <div id="graph-modal-container" class="graph-modal-body graph-canvas">
        <svg id="knowledge-graph-modal"></svg>
      </div>
      <p class="graph-modal-hint">노드를 클릭해 글로 이동 · 드래그로 탐색</p>
    </div>
  </div>

  <script>
    window.CURRENT_PAGE = "{{ page.url }}";
    window.SITE_BASEURL = "{{ site.baseurl }}";
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="{{ '/assets/js/graph.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
