<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/graph.css' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="page-{{ page.layout | default: 'default' }}{% if page.url == '/' %} is-home{% endif %}">
  <div class="ambient-orb ambient-orb-a"></div>
  <div class="ambient-orb ambient-orb-b"></div>

  <div class="site-shell">
    <header class="site-chrome">
      <a class="site-mark" href="{{ '/' | relative_url }}">
        <span class="site-mark-name">{{ site.title }}</span>
        <span class="site-mark-tag">{{ site.tagline }}</span>
      </a>

      <nav class="site-links" aria-label="site">
        <button id="explore-btn" class="btn-explore" aria-haspopup="dialog">explore</button>
      </nav>
    </header>

    <main id="main-content" class="content-flow">
      {{ content }}
    </main>
  </div>

  <!-- 그래프 모달 -->
  <div id="graph-modal" class="graph-modal" role="dialog" aria-modal="true" aria-label="지식 그래프">
    <div class="graph-modal-backdrop"></div>
    <div class="graph-modal-panel">
      <header class="graph-modal-header">
        <span class="graph-modal-title">knowledge graph</span>
        <button id="graph-modal-close" class="graph-modal-close" aria-label="닫기">✕</button>
      </header>
      <div id="graph-modal-container" class="graph-modal-body">
        <svg id="knowledge-graph-modal"></svg>
      </div>
      <p class="graph-modal-hint">노드를 클릭해 글로 이동 · 드래그로 탐색</p>
    </div>
  </div>

  <script>
    window.CURRENT_PAGE = "{{ page.url }}";
    window.SITE_BASEURL = "{{ site.baseurl }}";
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="{{ '/assets/js/graph.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
