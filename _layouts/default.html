<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="page-{{ page.layout | default: 'default' }}{% if page.url == '/' %} is-home{% endif %}">

  <header class="site-header">
    <a class="site-logo" href="{{ '/' | relative_url }}">HIJKM</a>
    <button id="explore-btn" class="btn-explore" aria-haspopup="dialog">explore</button>
  </header>

  <div class="site-shell">
    <main id="main-content">
      {{ content }}
    </main>
  </div>

  <!-- 그래프 모달 -->
  <div id="graph-modal" class="graph-modal" role="dialog" aria-modal="true" aria-label="지식 그래프">
    <div class="graph-modal-backdrop"></div>
    <div class="graph-modal-panel">
      <header class="graph-modal-header">
        <span class="graph-modal-title">knowledge graph</span>
        <button id="graph-modal-close" class="graph-modal-close" aria-label="닫기">✕</button>
      </header>
      <div id="graph-modal-container" class="graph-modal-body">
        <svg id="knowledge-graph-modal"></svg>
      </div>
      <p class="graph-modal-hint">노드를 클릭해 글로 이동 · 드래그로 탐색</p>
    </div>
  </div>

  <script>
    window.CURRENT_PAGE = "{{ page.url }}";
    window.SITE_BASEURL = "{{ site.baseurl }}";
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="{{ '/assets/js/graph.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
