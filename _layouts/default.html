<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/graph.css' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="page-{{ page.layout | default: 'default' }}{% if page.url == '/' %} is-home{% endif %}{% if page.url contains '/graph' %} is-graph{% endif %}">
  <div class="ambient-orb ambient-orb-a"></div>
  <div class="ambient-orb ambient-orb-b"></div>

  <div class="site-shell">
    <header class="site-chrome">
      <a class="site-mark" href="{{ '/' | relative_url }}">
        <span class="site-mark-name">{{ site.title }}</span>
        <span class="site-mark-tag">{{ site.tagline }}</span>
      </a>

      <nav class="site-links" aria-label="site">
        <a href="{{ '/graph' | relative_url }}" class="btn-explore">explore</a>
      </nav>
    </header>

    <main id="main-content" class="content-flow">
      {{ content }}
    </main>
  </div>

  <script>
    window.CURRENT_PAGE = "{{ page.url }}";
    window.SITE_BASEURL = "{{ site.baseurl }}";
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="{{ '/assets/js/graph.js' | relative_url }}"></script>
</body>
</html>
